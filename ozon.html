<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ozon Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0b0b0e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    touch-action: pan-y; /* Разрешаем вертикальный скролл, но не мешаем горизонтальному свайпу */
  }

  #loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0b0b0e;
    z-index: 300;
    transition: opacity .4s, visibility .4s;
  }
  #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,.15);
    border-top-color: #005bff;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { margin-top: 16px; color: rgba(255,255,255,.6); font-size: 14px; }

  #viewer { display: none; width: 100%; height: 100%; position: relative; }
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,.6) 0%, transparent 100%);
    z-index: 50; pointer-events: none;
  }
  .header > * { pointer-events: auto; }
  .logo { font-weight: 700; font-size: 18px; letter-spacing: .5px; }
  .logo span { color: #005bff; }
  .counter {
    font-size: 13px; font-weight: 500;
    background: rgba(255,255,255,.1); backdrop-filter: blur(8px);
    padding: 5px 12px; border-radius: 16px; color: rgba(255,255,255,.8);
  }

  .slider-wrap { width: 100%; height: 100%; overflow: hidden; position: relative; }
  .track {
    display: flex; height: 100%;
    transition: transform 0.4s cubic-bezier(.2,.8,.2,1);
    will-change: transform;
    /* Важно: отключаем выделение и контекстное меню для чистого свайпа */
    user-select: none;
    -webkit-user-select: none;
  }
  .slide {
    min-width: 100vw; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 70px 12px 80px;
    /* Запрещаем драг картинок, чтобы не мешал свайпу */
    -webkit-user-drag: none;
  }
  .slide img {
    max-height: 100%; max-width: 100%;
    object-fit: contain; border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
    pointer-events: none; /* Картинка не перехватывает тачи */
    -webkit-user-drag: none;
    user-select: none;
  }

  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 40; width: 44px; height: 44px; border: none; border-radius: 50%;
    background: rgba(255,255,255,.08); backdrop-filter: blur(10px);
    color: #fff; font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,.18); transform: translateY(-50%) scale(1.05); }
  .nav-btn:active { transform: translateY(-50%) scale(.95); }
  .prev { left: 10px; } .next { right: 10px; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: center; padding: 16px 20px;
    background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
    z-index: 50;
  }
  .dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 60%; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.2); cursor: pointer;
    transition: all .25s; flex-shrink: 0;
  }
  .dot.active { background: #005bff; width: 22px; border-radius: 4px; }

  .hint {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.2); font-size: 12px; pointer-events: none;
  }

  @media (max-width: 768px) {
    .nav-btn { width: 38px; height: 38px; font-size: 20px; }
    .prev { left: 6px; } .next { right: 6px; }
    .slide { padding: 60px 8px 70px; }
    .hint { display: none; }
    .dots { max-width: 50%; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p id="loadText">Загрузка карточек...</p>
</div>

<div id="viewer">
  <div class="header">
    <div class="logo"><span>Ozon</span> Cards</div>
    <div class="counter" id="counter">1 / 1</div>
  </div>

  <div class="slider-wrap">
    <div class="track" id="track"></div>
  </div>

  <button class="nav-btn prev" id="prevBtn">‹</button>
  <button class="nav-btn next" id="nextBtn">›</button>

  <div class="bottom-bar"><div class="dots" id="dots"></div></div>
  <div class="hint">← → для навигации</div>
</div>

<script>
(function() {
  // ================= КОНФИГ =================
  const FOLDER = 'ozon/';
  const FILES  = [
    '1.png', '2.png', '3.png', '4.png' // ← замените на свои
  ];
  // ==========================================

  const loader = document.getElementById('loader');
  const loadText = document.getElementById('loadText');
  const viewer = document.getElementById('viewer');
  const track = document.getElementById('track');
  const counter = document.getElementById('counter');
  const dotsCont = document.getElementById('dots');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  let currentIndex = 0;
  let validFiles = [];
  
  // Состояние свайпа
  let isDragging = false;
  let startX = 0;
  let startTranslate = 0;

  // 1. Предзагрузка
  function preload() {
    let loaded = 0;
    const total = FILES.length;

    FILES.forEach((file, i) => {
      const img = new Image();
      img.onload = () => {
        loaded++;
        loadText.textContent = `Загружено ${loaded} из ${total}`;
        if (loaded === total) initViewer();
      };
      img.onerror = () => {
        console.warn(`Не загружено: ${file}`);
        loaded++;
        if (loaded === total) initViewer();
      };
      img.src = FOLDER + file;
      validFiles.push(file);
    });

    setTimeout(() => { if (!loader.classList.contains('hidden')) initViewer(); }, 2000);
  }

  // 2. Инициализация
  function initViewer() {
    if (validFiles.length === 0) {
      loadText.textContent = 'Нет изображений. Проверьте FILES.';
      return;
    }

    track.innerHTML = '';
    dotsCont.innerHTML = '';

    validFiles.forEach((file, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      const img = document.createElement('img');
      img.src = FOLDER + file;
      img.alt = file;
      img.loading = i < 3 ? 'eager' : 'lazy';
      img.draggable = false; // Отключаем нативный драг
      slide.appendChild(img);
      track.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', (e) => { e.stopPropagation(); goTo(i); });
      dotsCont.appendChild(dot);
    });

    loader.classList.add('hidden');
    viewer.style.display = 'block';
    goTo(0);
    setupSwipe();
  }

  // 3. Переход к слайду
  function goTo(index) {
    if (index < 0) index = 0;
    if (index >= validFiles.length) index = validFiles.length - 1;
    currentIndex = index;
    
    const offset = -currentIndex * track.clientWidth;
    track.style.transform = `translateX(${offset}px)`;
    
    counter.textContent = `${currentIndex + 1} / ${validFiles.length}`;
    
    document.querySelectorAll('.dot').forEach((d, i) => 
      d.classList.toggle('active', i === currentIndex)
    );
  }

  prevBtn.addEventListener('click', (e) => { e.stopPropagation(); goTo(currentIndex - 1); });
  nextBtn.addEventListener('click', (e) => { e.stopPropagation(); goTo(currentIndex + 1); });

  document.addEventListener('keydown', e => {
    if (viewer.style.display === 'none') return;
    if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  });

  window.addEventListener('resize', () => goTo(currentIndex));

  // 4. Свайпы — ИСПРАВЛЕННАЯ ВЕРСИЯ
  function setupSwipe() {
    track.addEventListener('touchstart', handleTouchStart, { passive: true });
    track.addEventListener('touchmove', handleTouchMove, { passive: false });
    track.addEventListener('touchend', handleTouchEnd);
    
    // Для десктопа (мышь)
    track.addEventListener('mousedown', handleMouseDown);
    track.addEventListener('mousemove', handleMouseMove);
    track.addEventListener('mouseup', handleMouseUp);
    track.addEventListener('mouseleave', handleMouseUp);
  }

  function handleTouchStart(e) {
    isDragging = true;
    startX = e.touches[0].clientX;
    startTranslate = -currentIndex * track.clientWidth;
    track.style.transition = 'none'; // Отключаем анимацию во время драга
  }

  function handleTouchMove(e) {
    if (!isDragging) return;
    e.preventDefault(); // Блокируем скролл страницы во время горизонтального свайпа
    const currentX = e.touches[0].clientX;
    const diff = currentX - startX;
    const newTranslate = startTranslate + diff;
    track.style.transform = `translateX(${newTranslate}px)`;
  }

  function handleTouchEnd() {
    if (!isDragging) return;
    isDragging = false;
    track.style.transition = 'transform 0.4s cubic-bezier(.2,.8,.2,1)';
    
    const currentTranslate = -currentIndex * track.clientWidth + (startX - (event.changedTouches[0]?.clientX || startX));
    const swipeThreshold = track.clientWidth * 0.15; // 15% ширины экрана
    
    // Определяем, был ли свайп достаточно сильным
    const diff = startX - (event.changedTouches[0]?.clientX || startX);
    
    if (diff > swipeThreshold) {
      goTo(currentIndex + 1); // Свайп влево → следующий
    } else if (diff < -swipeThreshold) {
      goTo(currentIndex - 1); // Свайп вправо → предыдущий
    } else {
      goTo(currentIndex); // Возврат на место
    }
  }

  // Мышь (десктоп)
  function handleMouseDown(e) {
    if (e.button !== 0) return; // Только левая кнопка
    isDragging = true;
    startX = e.clientX;
    startTranslate = -currentIndex * track.clientWidth;
    track.style.transition = 'none';
    track.style.cursor = 'grabbing';
  }

  function handleMouseMove(e) {
    if (!isDragging) return;
    const currentX = e.clientX;
    const diff = currentX - startX;
    const newTranslate = startTranslate + diff;
    track.style.transform = `translateX(${newTranslate}px)`;
  }

  function handleMouseUp() {
    if (!isDragging) return;
    isDragging = false;
    track.style.transition = 'transform 0.4s cubic-bezier(.2,.8,.2,1)';
    track.style.cursor = '';
    
    const diff = startX - (event.clientX || startX);
    const swipeThreshold = track.clientWidth * 0.15;
    
    if (diff > swipeThreshold) {
      goTo(currentIndex + 1);
    } else if (diff < -swipeThreshold) {
      goTo(currentIndex - 1);
    } else {
      goTo(currentIndex);
    }
  }

  // Запуск
  preload();
})();
</script>
</body>
</html>
